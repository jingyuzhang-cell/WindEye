        // 配置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        
        let showStrongLinks = true;
        let showWeakLinks = true;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        // 颜色配置
        const colors = {
            0: '#FF6B6B',
            1: '#4ECDC4',
            2: '#95E1D3'
        };
        
        // 计算画布大小
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
        }
        
        // 计算节点位置
        function calculatePositions() {
            const width = canvas.width;
            const height = canvas.height;
            const positions = {};
            
            // 按层级分组
            const levels = {0: [], 1: [], 2: []};
            nodes.forEach(node => {
                levels[node.level].push(node);
            });
            
            // Y坐标
            const yPositions = {
                0: height * 0.2,
                1: height * 0.5,
                2: height * 0.8
            };
            
            // 为每层计算X坐标
            Object.keys(levels).forEach(level => {
                const levelNodes = levels[level];
                const n = levelNodes.length;
                const spacing = width / (n + 1);
                
                levelNodes.forEach((node, i) => {
                    positions[node.id] = {
                        x: spacing * (i + 1),
                        y: yPositions[level]
                    };
                });
            });
            
            return positions;
        }
        
        const positions = calculatePositions();
        
        // 绘制函数
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            // 绘制连接
            links.forEach(link => {
                if (link.is_strong && !showStrongLinks) return;
                if (!link.is_strong && !showWeakLinks) return;
                
                const source = positions[link.source];
                const target = positions[link.target];
                
                if (!source || !target) return;
                
                ctx.beginPath();
                ctx.moveTo(source.x, source.y);
                ctx.lineTo(target.x, target.y);
                
                if (link.is_strong) {
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([]);
                } else {
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 5]);
                }
                
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 绘制箭头
                const angle = Math.atan2(target.y - source.y, target.x - source.x);
                const arrowSize = 10;
                ctx.fillStyle = link.is_strong ? '#555' : '#aaa';
                ctx.beginPath();
                ctx.moveTo(target.x, target.y);
                ctx.lineTo(
                    target.x - arrowSize * Math.cos(angle - Math.PI / 6),
                    target.y - arrowSize * Math.sin(angle - Math.PI / 6)
                );
                ctx.lineTo(
                    target.x - arrowSize * Math.cos(angle + Math.PI / 6),
                    target.y - arrowSize * Math.sin(angle + Math.PI / 6)
                );
                ctx.closePath();
                ctx.fill();
            });
            
            // 绘制节点
            nodes.forEach(node => {
                const pos = positions[node.id];
                if (!pos) return;
                
                const boxWidth = 120;
                const boxHeight = 60;
                const x = pos.x - boxWidth / 2;
                const y = pos.y - boxHeight / 2;
                
                // 绘制矩形
                ctx.fillStyle = colors[node.level];
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                ctx.roundRect(x, y, boxWidth, boxHeight, 8);
                ctx.fill();
                ctx.stroke();
                
                // 绘制文本
                ctx.fillStyle = '#000';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.fillText(node.perspective_name, pos.x, pos.y - 10);
                ctx.font = '11px sans-serif';
                ctx.fillText(`C${node.community_id}`, pos.x, pos.y + 5);
                ctx.font = 'italic 10px sans-serif';
                ctx.fillText(`(${node.node_count}节点)`, pos.x, pos.y + 20);
            });
            
            ctx.restore();
        }
        
        // 鼠标事件
        let isDragging = false;
        let lastX, lastY;
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left - offsetX) / scale;
            const y = (e.clientY - rect.top - offsetY) / scale;
            
            if (isDragging) {
                offsetX += e.clientX - lastX;
                offsetY += e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;
                draw();
                return;
            }
            
            // 检查鼠标是否在节点上
            let hoverNode = null;
            for (const node of nodes) {
                const pos = positions[node.id];
                if (!pos) continue;
                
                if (Math.abs(x - pos.x) < 60 && Math.abs(y - pos.y) < 30) {
                    hoverNode = node;
                    break;
                }
            }
            
            if (hoverNode) {
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 10 + 'px';
                tooltip.style.top = e.clientY + 10 + 'px';
                tooltip.innerHTML = `
                    <strong>${hoverNode.perspective_name} - 社区${hoverNode.community_id}</strong><br>
                    节点数: ${hoverNode.node_count}<br>
                    核心节点: ${hoverNode.core_node_count}<br>
                    主要类型: ${hoverNode.main_node_types}<br>
                    关键法规: ${hoverNode.key_regulations}
                `;
            } else {
                tooltip.style.display = 'none';
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            tooltip.style.display = 'none';
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            scale = Math.max(0.1, Math.min(5, scale));
            draw();
        });
        
        // 控制函数
        function resetView() {
            scale = 1;
            offsetX = 0;
            offsetY = 0;
            showStrongLinks = true;
            showWeakLinks = true;
            draw();
        }
        
        function toggleStrongLinks() {
            showStrongLinks = !showStrongLinks;
            draw();
        }
        
        function toggleWeakLinks() {
            showWeakLinks = !showWeakLinks;
            draw();
        }
        
        function exportImage() {
            const link = document.createElement('a');
            link.download = 'community_hierarchy.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // 初始化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
