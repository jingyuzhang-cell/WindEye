# WindEye Nginx Configuration for Windows Server
# Place at: C:\nginx\conf\nginx.conf  (or your nginx install path)
#
# Architecture:
#   Internet → Nginx (:80) → /api/v1/*  → uvicorn backend (127.0.0.1:8000)
#                           → /docs     → Swagger UI (127.0.0.1:8000)
#                           → /openapi.json → backend
#                           → /*        → Frontend static files

worker_processes  auto;

events {
    worker_connections  2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # ---- Gzip ----
    gzip  on;
    gzip_types  text/plain text/css application/json application/javascript text/xml application/xml;

    # ---- Rate limiting (optional) ----
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=20r/s;

    server {
        listen       80;
        server_name  _;                     # Replace with your domain or IP

        # ---- CORS headers for external API consumers ----
        add_header  Access-Control-Allow-Origin   "*"  always;
        add_header  Access-Control-Allow-Methods  "GET, POST, PUT, DELETE, OPTIONS"  always;
        add_header  Access-Control-Allow-Headers  "Content-Type, Authorization"  always;
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ---- Swagger docs ----
        location /docs {
            proxy_pass  http://127.0.0.1:8000;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /openapi.json {
            proxy_pass  http://127.0.0.1:8000;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
        }

        # ---- Backend API ----
        location /api/ {
            proxy_pass  http://127.0.0.1:8000;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Long timeout for graph queries (depth=5 may take 30s+)
            proxy_read_timeout     120s;
            proxy_send_timeout     120s;
            proxy_connect_timeout  10s;

            # SSE streaming support
            proxy_buffering        off;
            proxy_cache            off;
            chunked_transfer_encoding  on;

            # Rate limit
            limit_req  zone=api_limit  burst=30  nodelay;
        }

        # ---- Frontend static files ----
        # Build frontend first: cd frontend && npm run build
        # Output goes to frontend/dist/ — point root there.
        root  C:/WindEye/frontend/dist;
        index  index.html;

        location / {
            try_files  $uri  $uri/  /index.html;
        }

        # ---- Health check ----
        location /health {
            proxy_pass  http://127.0.0.1:8000;
            access_log  off;
        }

        # ---- Security: hide server version ----
        server_tokens  off;
    }
}
